# =============================================================================
# ZAP Full Scan - 재사용 가능한 워크플로우
# =============================================================================
# 목적: 웹 애플리케이션의 전체 보안 스캔
# 방식: 능동 스캔 (Active) - 실제 공격 수행!
# 소요시간: 20-60분
#
# 주의: 실제 공격을 수행합니다 (SQL Injection, XSS 등)
#       절대 프로덕션 환경에서 실행 금지!
#
# [외부 URL 스캔 방법]
#   app_start_command 를 비워두면 앱 실행 없이 target_url 을 바로 스캔합니다.
#   반드시 테스트 환경 URL만 입력하세요!
# =============================================================================

name: Reusable ZAP Full Scan

on:
  workflow_call:
    inputs:
      force_run:
        required: false
        type: boolean
        default: false
        description: '토픽 없이 강제 실행'

      target_url:
        required: true
        type: string
        description: '테스트 환경 URL만 입력! (운영 환경 절대 금지)'

      app_start_command:
        required: false              # ★ 변경: true → false (외부 URL 스캔 시 비워두기)
        type: string
        default: ''                  # ★ 추가: 기본값 빈칸
        description: '앱 시작 명령어 (외부 서버 스캔 시 비워두면 앱 실행 생략)'

      app_port:
        required: false
        type: string
        default: '3000'
        description: '앱 포트 (app_start_command 사용 시에만 의미 있음)'

      scan_timeout:
        required: false
        type: string
        default: '60'
        description: '스캔 타임아웃 (분, 기본: 60)'

jobs:
  check-topic:
    name: Check Topic or Force Run
    runs-on: self-hosted
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check for auto-zap-full topic or force_run
        id: check
        uses: actions/github-script@v6
        with:
          script: |
            if (${{ inputs.force_run }}) {
              core.setOutput('enabled', 'true');
              console.log('WARNING: This will perform ACTIVE attacks!');
              return;
            }
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const topics = repo.data.topics || [];
            if (topics.includes('auto-zap-full')) {
              core.setOutput('enabled', 'true');
              console.log('WARNING: This will perform ACTIVE attacks!');
            } else {
              core.setOutput('enabled', 'false');
              console.log('ZAP Full scan disabled (no auto-zap-full topic)');
            }

  zap-full:
    name: Run ZAP Full Scan (Active Attacks)
    needs: check-topic
    if: needs.check-topic.outputs.enabled == 'true'
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # ★ 변경: app_start_command 가 있을 때만 앱 실행 (없으면 이 step 건너뜀)
      - name: Start application
        if: inputs.app_start_command != ''
        run: |
          echo "WARNING: Starting application for FULL SCAN (ACTIVE ATTACKS)"
          echo "Target: ${{ inputs.target_url }}"

          ${{ inputs.app_start_command }} &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV

          for i in {1..30}; do
            if curl -s http://localhost:${{ inputs.app_port }}/health > /dev/null 2>&1 || \
               curl -s http://localhost:${{ inputs.app_port }} > /dev/null 2>&1; then
              echo "App ready!"
              break
            fi
            sleep 2
          done

      # ★ 추가: 외부 URL 스캔 시 대상 확인 로그
      - name: Verify external target
        if: inputs.app_start_command == ''
        run: |
          echo "외부 URL 스캔 모드 - 앱 실행 생략"
          echo "WARNING: ACTIVE ATTACKS will be performed on ${{ inputs.target_url }}"
          echo "대상 서버 응답 확인 중..."
          curl -sk --max-time 10 ${{ inputs.target_url }} > /dev/null \
            && echo "대상 서버 응답 확인됨" \
            || echo "경고: 대상 서버 응답 없음 - 스캔을 계속 진행합니다"

      # ZAP Docker 이미지 다운로드
      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      # ZAP Full 스캔 실행 (HTML만 생성)
      - name: Run ZAP Full Scan
        run: |
          echo "Running ZAP Full Scan (ACTIVE ATTACKS)..."
          echo "Target: ${{ inputs.target_url }}"
          echo "Timeout: ${{ inputs.scan_timeout }} minutes"

          docker run --rm \
            --user root \
            --network host \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
            -t ${{ inputs.target_url }} \
            -r report_html.html \
            -m ${{ inputs.scan_timeout }} || true

          echo "Scan completed"
        continue-on-error: true

      # HTML 리포트만 업로드 (3일 보관)
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-full-report-${{ github.run_number }}-${{ strategy.job-index }}
          path: report_html.html
          retention-days: 3
          compression-level: 6

      # ★ 변경: app_start_command 가 있을 때만 앱 종료 (없으면 이 step 건너뜀)
      - name: Stop application
        if: always() && inputs.app_start_command != ''
        run: |
          if [ ! -z "${{ env.APP_PID }}" ]; then
            kill ${{ env.APP_PID }} 2>/dev/null || true
          fi
